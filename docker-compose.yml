services:
  fntv-proxy:
    image: jimboo7339/fntv-proxy:latest
    container_name: fntv-proxy
    ports:
      - "28005:28005"
      - "8095:8095"   # Emby 代理（emby.enabled: true 时需要）
    volumes:
      # 挂载strm文件目录（根据实际路径修改）
      - /vol00:/vol00:ro
      # 挂载配置文件（可选，用于热重载）
      - ./config.yaml:/app/config.yaml:ro
      # 可选：挂载日志目录（debug模式）
      # - ./logs:/app/logs
    environment:
      # 配置文件路径
      - CONFIG=/app/config.yaml
    restart: unless-stopped
    # 使用host网络可以访问本机8005
    # network_mode: host
